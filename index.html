<!DOCTYPE html>
<html lang="es">
	<head>
		<title>Inicio de Sesión | SAGA | UNESR Camaguán</title>
		
		<link rel="icon" href="img/favicon.ico">
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="styles/login/style.css">
	</head>
	
	<body>
		<div class="left">
			<img src="img/banner.png" alt="">
		</div>
		
		<div class="right" id="right">
			<div class="top">
				<div class="brand">
					<span>SAGA</span>
				</div>
				<a id="register-btn" href="#">Crear cuenta</a>
			</div>
			<div class="forms">
				<div class="login">
					<h1 class="welcome-message">Bienvenido al Sistema UNESR SAGA</h1>
					<p class="login-description">Ingrese sus datos.</p>
					<form action="">
						<div class="input-container">
							<input type="text" placeholder="Nombre de usuario o Correo">
							<input type="password" placeholder="Contraseña">
						</div>
						<div class="options-container">
							<div class="checkbox">
								<input id="checkbox" type="checkbox">
								<label for="checkbox">Mantener mi sesión iniciada</label>
							</div>
							<!-- <a href="#">¿Olvido su contraseña?</a> -->
						</div>
						<a href="saga.html" class="wasa"><button>Ingresar</button></a>
					</form>
				</div>
				<div class="register">
					<h1 class="welcome-message">Bienvenido al Sistema UNESR SAGA</h1>
					<p class="login-description">Ingrese los siguientes datos.</p>
					<form action="">
						<div class="input-container">
							<input type="text" placeholder="Correo electronico">
							<input type="password" placeholder="Contraseña">
						</div>
						<button>Registrar</button>
						<p class="footer-note">Para crear una cuenta debes contar con permisos de la Administración</p>
					</form>
				</div>
			</div>
		</div>
		
	</body>
	
	<script src="scripts/login/script.js"></script>
</html>
